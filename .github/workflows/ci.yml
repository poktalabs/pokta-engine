name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the test run only (the pricing-chain integration test
    # runs against this; without it, that test self-skips). Torn down after the job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: godin_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d godin_engine"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/godin_engine

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager" (don't double-specify)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck web SPA
        run: pnpm --filter @godin-engine/web typecheck

      - name: Apply migrations (creates engine_* tables for the integration test)
        run: pnpm --filter @godin-engine/db db:migrate

      - name: Test
        run: pnpm test
